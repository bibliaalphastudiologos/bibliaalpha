<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="gA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#fce97a"/>
      <stop offset="28%"  stop-color="#e8b840"/>
      <stop offset="52%"  stop-color="#b87d10"/>
      <stop offset="76%"  stop-color="#e8b840"/>
      <stop offset="100%" stop-color="#c09020"/>
    </linearGradient>
    <linearGradient id="gB" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#f0d060"/>
      <stop offset="50%"  stop-color="#c49020"/>
      <stop offset="100%" stop-color="#906010"/>
    </linearGradient>
    <linearGradient id="gP" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#0e0e0e"/>
      <stop offset="50%"  stop-color="#262626"/>
      <stop offset="100%" stop-color="#0e0e0e"/>
    </linearGradient>
    <filter id="ds" x="-15%" y="-15%" width="130%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="rgba(0,0,0,0.50)"/>
    </filter>
  </defs>

  <!-- α character — font-family com fallbacks para todos os browsers -->
  <text x="96" y="138"
        font-family="Georgia, Palatino, 'Palatino Linotype', 'Book Antiqua', serif"
        font-style="italic"
        font-size="162"
        font-weight="400"
        text-anchor="middle"
        fill="url(#gA)"
        filter="url(#ds)">α</text>

  <!-- Livro aberto — página esquerda -->
  <path d="M 8,178 Q 22,158 50,150 Q 72,145 96,147 Q 68,151 54,163 Q 36,176 30,184 Z"
        fill="url(#gP)"/>
  <!-- Livro aberto — página direita -->
  <path d="M 184,178 Q 170,158 142,150 Q 120,145 96,147 Q 124,151 138,163 Q 156,176 162,184 Z"
        fill="url(#gP)"/>
  <!-- Borda dourada esquerda -->
  <path d="M 96,147 Q 68,143 44,149 Q 30,153 24,162 Q 40,153 66,149 Q 80,147 96,147 Z"
        fill="url(#gB)"/>
  <!-- Borda dourada direita -->
  <path d="M 96,147 Q 124,143 148,149 Q 162,153 168,162 Q 152,153 126,149 Q 112,147 96,147 Z"
        fill="url(#gB)"/>
  <!-- Lombada -->
  <ellipse cx="96" cy="162" rx="4" ry="18" fill="url(#gB)"/>
  <!-- Borda inferior esquerda -->
  <path d="M 30,182 Q 44,188 70,186 Q 82,185 96,185 L 96,189 Q 80,189 56,191 Q 28,193 16,182 Z"
        fill="url(#gB)"/>
  <!-- Borda inferior direita -->
  <path d="M 162,182 Q 148,188 122,186 Q 110,185 96,185 L 96,189 Q 112,189 136,191 Q 164,193 176,182 Z"
        fill="url(#gB)"/>
</svg>