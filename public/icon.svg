<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
      <defs>
        <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#e8c97a"/>
          <stop offset="100%" stop-color="#b8893a"/>
        </linearGradient>
      </defs>

      <!-- Triângulo apontando para cima -->
      <polygon
        points="96,28 168,156 24,156"
        fill="none"
        stroke="url(#gold)"
        stroke-width="4.5"
        stroke-linejoin="round"
      />

      <!-- Triângulo apontando para baixo -->
      <polygon
        points="96,164 24,36 168,36"
        fill="none"
        stroke="url(#gold)"
        stroke-width="4.5"
        stroke-linejoin="round"
      />

      <!-- Ponto central -->
      <circle cx="96" cy="96" r="4" fill="#c9a96e"/>

      <!-- Letra Alpha -->
      <text
        x="96" y="101"
        text-anchor="middle"
        font-family="Georgia, serif"
