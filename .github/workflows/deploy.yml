name: Deploy to Firebase (Hosting + Functions)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SENTINELA_AI_489015 }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Set MP_ACCESS_TOKEN in Secret Manager
        run: |
          if gcloud secrets describe MP_ACCESS_TOKEN --project=sentinela-ai-489015 &>/dev/null; then
            printf "%s" "$MP_VAL" | gcloud secrets versions add MP_ACCESS_TOKEN --data-file=- --project=sentinela-ai-489015
          else
            printf "%s" "$MP_VAL" | gcloud secrets create MP_ACCESS_TOKEN --data-file=- --project=sentinela-ai-489015 --replication-policy=automatic
          fi
        env:
          MP_VAL: ${{ secrets.MP_ACCESS_TOKEN }}

      - name: Set MP_WEBHOOK_SECRET in Secret Manager
        run: |
          if gcloud secrets describe MP_WEBHOOK_SECRET --project=sentinela-ai-489015 &>/dev/null; then
            printf "%s" "$MP_VAL" | gcloud secrets versions add MP_WEBHOOK_SECRET --data-file=- --project=sentinela-ai-489015
          else
            printf "%s" "$MP_VAL" | gcloud secrets create MP_WEBHOOK_SECRET --data-file=- --project=sentinela-ai-489015 --replication-policy=automatic
          fi
        env:
          MP_VAL: ${{ secrets.MP_WEBHOOK_SECRET }}

      - name: Grant Secret Accessor to Functions SA
        run: |
          SA="firebase-app-hosting-compute@sentinela-ai-489015.iam.gserviceaccount.com"
          for SECRET in MP_ACCESS_TOKEN MP_WEBHOOK_SECRET; do
            gcloud secrets add-iam-policy-binding $SECRET \
              --project=sentinela-ai-489015 \
              --member="serviceAccount:$SA" \
              --role="roles/secretmanager.secretAccessor" || true
          done

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          VITE_GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Install and build Functions
        run: |
          cd functions
          npm ci
          npm run build

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SENTINELA_AI_489015 }}
          projectId: sentinela-ai-489015
          channelId: live

      - name: Deploy Firebase Functions
        run: firebase deploy --only functions --project sentinela-ai-489015 --non-interactive
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}
