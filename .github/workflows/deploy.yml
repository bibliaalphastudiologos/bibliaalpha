name: Deploy to Firebase (Hosting + Functions)

on:h
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_O_ANALISTA_5FBCF }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          VITE_GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Install and build Functions
        run: |
          cd functions
          npm install
          npm run build

      - name: Create functions .env file
        run: |
          printf 'MP_ACCESS_TOKEN=%s\nMP_WEBHOOK_SECRET=%s\n' "$MP_TOKEN" "$MP_SECRET" > functions/.env
        env:
          MP_TOKEN: ${{ secrets.MP_ACCESS_TOKEN }}
          MP_SECRET: ${{ secrets.MP_WEBHOOK_SECRET }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_O_ANALISTA_5FBCF }}
          projectId: o-analista-5fbcf
          channelId: live

      - name: Deploy Firebase Functions
        run: firebase deploy --only functions --project o-analista-5fbcf --non-interactive
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}
