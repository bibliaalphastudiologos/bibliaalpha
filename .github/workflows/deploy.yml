name: Deploy to Firebase (Hosting + Firestore + Functions)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_O_ANALISTA_5FBCF }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          VITE_GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Install and build Functions
        run: |
          cd functions
          npm install
          npm run build

      - name: Create functions .env file
        run: |
          printf 'MP_ACCESS_TOKEN=%s\nMP_WEBHOOK_SECRET=%s\n' "$MP_TOKEN" "$MP_SECRET" > functions/.env
        env:
          MP_TOKEN: ${{ secrets.MP_ACCESS_TOKEN }}
          MP_SECRET: ${{ secrets.MP_WEBHOOK_SECRET }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Firestore Rules via REST API
        continue-on-error: true
        run: |
          python3 - << 'PYEOF'
          import json, urllib.request, subprocess, sys

          project = "o-analista-5fbcf"
          token = subprocess.check_output(["gcloud", "auth", "print-access-token"]).decode().strip()
          rules = open("firestore.rules").read()

          headers = {"Authorization": f"Bearer {token}", "Content-Type": "application/json"}

          # 1. Criar novo ruleset
          payload = json.dumps({"source": {"files": [{"content": rules, "name": "firestore.rules"}]}}).encode()
          req = urllib.request.Request(f"https://firebaserules.googleapis.com/v1/projects/{project}/rulesets", data=payload, headers=headers, method="POST")
          with urllib.request.urlopen(req) as r:
              ruleset = json.load(r)
          ruleset_name = ruleset["name"]
          print(f"Ruleset criado: {ruleset_name}")

          # 2. Atualizar release cloud.firestore
          rel_payload = json.dumps({"release": {"name": f"projects/{project}/releases/cloud.firestore", "rulesetName": ruleset_name}}).encode()
          for method in ["PATCH", "POST"]:
              url = f"https://firebaserules.googleapis.com/v1/projects/{project}/releases/cloud.firestore"
              if method == "POST":
                  url = f"https://firebaserules.googleapis.com/v1/projects/{project}/releases"
              req2 = urllib.request.Request(url, data=rel_payload, headers=headers, method=method)
              try:
                  with urllib.request.urlopen(req2) as r2:
                      result = json.load(r2)
                  print(f"Release atualizado ({method}): {result.get('name', 'ok')}")
                  break
              except urllib.error.HTTPError as e:
                  print(f"{method} falhou: {e.code} {e.read().decode()[:200]}")
          'PYEOF'
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}

      - name: Deploy Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_O_ANALISTA_5FBCF }}
          projectId: o-analista-5fbcf
          channelId: live

      - name: Deploy Firebase Functions
        continue-on-error: true
        run: firebase deploy --only functions --project o-analista-5fbcf --non-interactive
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}
