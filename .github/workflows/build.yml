name: Build and Deploy
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - name: Build
        run: npm run build
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          VITE_GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Deploy via SFTP to Hostinger (port 65002)
        continue-on-error: true
        env:
          SFTP_USER: ${{ secrets.FTP_USERNAME }}
          SFTP_PASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          sudo apt-get install -y lftp sshpass -qq
          lftp -u "$SFTP_USER,$SFTP_PASS" \
            -e "set sftp:connect-program 'ssh -p 65002 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'; \
                mirror -R --delete --verbose dist/ /public_html/; \
                bye" \
            sftp://ftp.studiologos.com.br || \
          lftp -u "$SFTP_USER,$SFTP_PASS" \
            -e "set sftp:connect-program 'ssh -p 65002 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'; \
                mirror -R --delete --verbose dist/ ./; \
                bye" \
            sftp://studiologos.com.br

      - name: Deploy via FTP to Hostinger (fallback)
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: /
          dangerous-clean-slate: false
          protocol: ftp
          port: 21
          timeout: 60000

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SENTINELA_AI_489015 }}
          channelId: live
          projectId: sentinela-ai-489015

      - name: Deploy Firestore Rules
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SENTINELA_AI_489015 }}
        run: |
          echo "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > /tmp/sa.json
          pip install google-auth requests --break-system-packages -q
          python3 -c "import base64; exec(base64.b64decode('').decode())"
