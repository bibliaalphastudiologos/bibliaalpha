name: Build and Deploy
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          VITE_GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Prepare dist
        run: |
          if [ -f public/.htaccess ]; then cp public/.htaccess dist/.htaccess; fi
          if [ -f public/sw.js ]; then cp public/sw.js dist/sw.js; fi
          echo "--- dist/ ---"
          ls -la dist/
          echo "--- sw.js version ---"
          head -3 dist/sw.js

      - name: Deploy via FTP to Hostinger (Python ftplib — passive mode)
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          pip install --quiet --break-system-packages ftplib 2>/dev/null || true
          python3 scripts/ftp_deploy.py

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SENTINELA_AI_489015 }}
          channelId: live
          projectId: sentinela-ai-489015
          target: sentinela-ai-489015

      - name: Deploy Firestore Rules
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SENTINELA_AI_489015 }}
        run: |
          echo "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > /tmp/sa.json
          pip install google-auth requests --break-system-packages -q
          python3 scripts/deploy_firestore_rules.py

      - name: Resumo do deploy
        run: |
          echo "=========================================="
          echo "  Deploy concluido!"
          echo "  Hostinger FTP: Python ftplib passive mode"
          echo "  Firebase Hosting: atualizado"
          echo "  Service Worker: v6"
          echo "=========================================="
